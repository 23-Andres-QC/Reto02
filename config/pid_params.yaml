lane_controller:
  ros__parameters:

    kp: 2.2
    ki: 0.12
    kd: 0.25
    kff: 0.6

    linear_speed: 0.30    # m/s — requisito de competencia ≥ 0.2 m/s, con margen

    max_angular: 2.0
    integral_limit: 0.5
    error_timeout: 0.5   # sin amarillo NI blanco por más de esto → frena por completo
    control_rate: 30.0

    calib_w: 0.20        # rad/s — límite máximo angular durante calibración inicial

    history_size: 15
    start_delay: 5.0
    imu_topic: /imu
    odom_topic: /odom_raw
    yaw_weight: 0.3   # peso del rumbo planeado (yaw inicial) durante avance normal

    calib_tolerance: 0.025      # m — error máximo para considerar "calibrado" (2.5cm, antes 1.2cm)
    calib_stable_frames: 8      # frames consecutivos centrado+quieto para confirmar (antes 15)
    calib_kp: 2.0                # ganancia angular durante calibración inicial (antes 1.0, muy lenta)
    slope_tolerance: 0.03       # m — pendiente máxima de la línea guía para considerar "recto" (antes 1.5cm)
    calib_kp_slope: 2.0           # ganancia angular sobre la pendiente durante calibración
    calib_min_w: 0.12             # rad/s — piso mínimo para superar zona muerta del motor
    curve_speed_factor: 0.6       # reduce velocidad lineal 40% SIEMPRE (no solo en curvas)
    slope_curve_threshold: 0.04   # m — pendiente mínima para anticipar curva (predictivo, vía cámara)

    sharp_turn_slope_threshold: 0.09  # m — pendiente que indica esquina ~90° real (no curva suave)
    sharp_turn_w: 0.40                # rad/s — giro base dedicado en la esquina
    sharp_turn_kp_e: 2.5              # ganancia sobre el error lateral — cierra el giro hacia el centro
    sharp_turn_max_w: 0.80            # rad/s — tope del giro (base + corrección)
    sharp_turn_speed_factor: 0.3      # avance muy reducido mientras gira en la esquina
