lane_controller:
  ros__parameters:

    kp: 4.0
    ki: 0.3
    kd: 0.4
    kff: 1.0

    linear_speed: 0.21   # m/s

    max_angular: 2.0
    integral_limit: 0.5
    error_timeout: 0.8
    control_rate: 30.0

    calib_w: 0.20        # rad/s — límite máximo angular en búsqueda
    drift_w: 0.15        # rad/s — giro suave buscando amarillo
    drift_trend: 0.004   # umbral de tendencia para corrección anticipada

    history_size: 15
    turn_threshold: 0.3
    start_delay: 5.0
    imu_topic: /imu
